volumes:
  postgres-data:
    driver: local
  valkey-data:
    driver: local
  

services:

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - 5432:5432

  valkey:
    image: valkey/valkey:9
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - 6379:6379
    volumes:
      - valkey-data:/data

  cerbos:
    restart: unless-stopped
    image: ghcr.io/cerbos/cerbos:latest
    container_name: boilerplate_cerbos
    command: ["server", "--config=/config.yaml"]
    ports:
      - 3592:3592
      - 3593:3593
    volumes:
      - ./cerbos.yaml:/config.yaml
      - ./policies:/policies