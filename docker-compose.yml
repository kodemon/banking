volumes:
  postgres-data:
    driver: local
  caddy-data:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # Reverse proxy
  # ---------------------------------------------------------------------------

  caddy:
    image: caddy:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: banking
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql

  # ---------------------------------------------------------------------------
  # Authorisation
  # ---------------------------------------------------------------------------

  cerbos:
    restart: unless-stopped
    image: ghcr.io/cerbos/cerbos:latest
    container_name: boilerplate_cerbos
    command: ["server", "--config=/config.yaml"]
    ports:
      - 3592:3592
      - 3593:3593
    volumes:
      - ./cerbos.yaml:/config.yaml
      - ./policies:/policies
